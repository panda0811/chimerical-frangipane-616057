<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Interactivo | LURE Perfumes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lure: {
                            bg: '#fbfaf6', border: '#e4ddcc', text: '#333333',
                            gold: '#b0965e', red: '#8c2d2d', input: '#f3eee5', muted: '#999999'
                        }
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #fbfaf6; color: #333333; }
        .custom-checkbox {
            appearance: none; width: 14px; height: 14px; border: 1px solid #d1c8b3;
            background-color: transparent; cursor: pointer; position: relative; margin-right: 8px; margin-top: 2px;
        }
        .custom-checkbox:checked::after {
            content: ''; position: absolute; top: 2px; left: 2px; width: 8px; height: 8px; background-color: #b0965e;
        }
    </style>
</head>
<body class="font-sans antialiased flex flex-col min-h-screen">

    <nav class="w-full border-b border-lure-border px-8 py-4 flex justify-between items-center bg-white">
        <a href="index.html" class="font-serif text-xl tracking-[0.2em] font-semibold uppercase">LURE<span class="text-lure-gold">.</span></a>
        <a href="index.html" class="text-xs uppercase tracking-widest hover:text-lure-gold transition-colors">Volver al Inicio</a>
    </nav>

    <header class="w-full border-b border-lure-border px-8 py-8 flex justify-between items-end bg-lure-bg">
        <h1 class="font-serif text-5xl font-medium tracking-wide">Productos</h1>
    </header>

    <main class="flex w-full flex-1 bg-lure-bg">
        <aside class="w-[280px] flex-shrink-0 border-r border-lure-border p-6 hidden md:block">
            
            <div class="mb-10">
                <h3 class="text-[10px] font-semibold tracking-[0.2em] uppercase text-lure-gold mb-4 border-b border-lure-border pb-2 flex justify-between items-center">
                    Género <span class="w-12 h-[1px] bg-lure-border"></span>
                </h3>
                <div class="space-y-3">
                    <label class="flex items-start justify-between text-xs text-gray-500 cursor-pointer hover:text-black w-full">
                        <div class="flex items-center">
                            <input type="checkbox" value="hombre" class="custom-checkbox filter-gender filter-trigger"> Hombre
                        </div>
                        <span id="count-hombre" class="text-lure-muted text-[10px]">0</span>
                    </label>
                    <label class="flex items-start justify-between text-xs text-gray-500 cursor-pointer hover:text-black w-full">
                        <div class="flex items-center">
                            <input type="checkbox" value="mujer" class="custom-checkbox filter-gender filter-trigger"> Mujer
                        </div>
                        <span id="count-mujer" class="text-lure-muted text-[10px]">0</span>
                    </label>
                </div>
            </div>

            <div class="mb-10">
                <h3 class="text-[10px] font-semibold tracking-[0.2em] uppercase text-lure-gold mb-4 border-b border-lure-border pb-2 flex justify-between items-center">
                    Disponibilidad <span class="w-12 h-[1px] bg-lure-border"></span>
                </h3>
                <label class="flex items-start justify-between text-xs text-gray-500 mb-3 cursor-pointer hover:text-black w-full">
                    <div class="flex items-center">
                        <input type="checkbox" id="filter-stock" class="custom-checkbox filter-trigger"> En existencia
                    </div>
                    <span id="count-stock" class="text-lure-muted text-[10px]">0</span>
                </label>
                <label class="flex items-start justify-between text-xs text-gray-500 cursor-pointer hover:text-black w-full">
                    <div class="flex items-center">
                        <input type="checkbox" id="filter-out" class="custom-checkbox filter-trigger"> Agotado
                    </div>
                    <span id="count-out" class="text-lure-muted text-[10px]">0</span>
                </label>
            </div>

            <div class="mb-10">
                <h3 class="text-[10px] font-semibold tracking-[0.2em] uppercase text-lure-gold mb-4 border-b border-lure-border pb-2 flex justify-between items-center">
                    Precio <span class="w-12 h-[1px] bg-lure-border"></span>
                </h3>
                <div class="flex items-center space-x-2">
                    <input type="number" id="min-price" value="0" class="w-full bg-lure-input border-none text-xs p-2 text-gray-600 focus:outline-none focus:ring-1 focus:ring-lure-gold filter-trigger-input">
                    <span class="text-gray-400">—</span>
                    <input type="number" id="max-price" value="1750000" class="w-full bg-lure-input border-none text-xs p-2 text-gray-600 focus:outline-none focus:ring-1 focus:ring-lure-gold filter-trigger-input">
                </div>
            </div>

            <div>
                <h3 class="text-[10px] font-semibold tracking-[0.2em] uppercase text-lure-gold mb-4 border-b border-lure-border pb-2 flex justify-between items-center">
                    Más Filtros <span class="w-12 h-[1px] bg-lure-border"></span>
                </h3>
                <div class="space-y-3">
                    <label class="flex items-start justify-between text-xs text-gray-500 cursor-pointer hover:text-black w-full">
                        <div class="flex items-center">
                            <input type="checkbox" value="arabe" class="custom-checkbox filter-category filter-trigger"> Arabe
                        </div>
                        <span id="count-arabe" class="text-lure-muted text-[10px]">0</span>
                    </label>
                    <label class="flex items-start justify-between text-xs text-gray-500 cursor-pointer hover:text-black w-full">
                        <div class="flex items-center">
                            <input type="checkbox" value="Combo Decant" class="custom-checkbox filter-category filter-trigger"> Combo Decant
                        </div>
                        <span id="count-combo" class="text-lure-muted text-[10px]">0</span>
                    </label>
                    <label class="flex items-start justify-between text-xs text-gray-500 cursor-pointer hover:text-black w-full">
                        <div class="flex items-center">
                            <input type="checkbox" value="diseñador" class="custom-checkbox filter-category filter-trigger"> Diseñador
                        </div>
                        <span id="count-disenador" class="text-lure-muted text-[10px]">0</span>
                    </label>
                    <label class="flex items-start justify-between text-xs text-gray-500 cursor-pointer hover:text-black w-full">
                        <div class="flex items-center">
                            <input type="checkbox" value="nicho" class="custom-checkbox filter-category filter-trigger"> Nicho
                        </div>
                        <span id="count-nicho" class="text-lure-muted text-[10px]">0</span>
                    </label>
                    <label class="flex items-start justify-between text-xs text-gray-500 cursor-pointer hover:text-black w-full">
                        <div class="flex items-center">
                            <input type="checkbox" value="unisex" class="custom-checkbox filter-category filter-trigger"> Unisex
                        </div>
                        <span id="count-unisex" class="text-lure-muted text-[10px]">0</span>
                    </label>
                </div>
            </div>
        </aside>

        <section class="flex-1 flex flex-col bg-white">
            <div class="h-[60px] border-b border-lure-border flex justify-between items-center px-6">
                <span class="text-[10px] font-bold tracking-widest uppercase text-gray-500">
                    <span id="product-count" class="text-black font-semibold">0</span> Artículos
                </span>
            </div>

            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3">
                </div>
            
            <div id="no-results" class="hidden p-12 text-center w-full">
                <p class="font-serif text-2xl text-gray-400">No se encontraron fragancias con estos filtros.</p>
                <button onclick="resetFilters()" class="mt-4 text-xs tracking-widest uppercase border border-lure-gold text-lure-gold px-6 py-2 hover:bg-lure-gold hover:text-white transition-colors">Limpiar Filtros</button>
            </div>
        </section>
    </main>

    <a href="https://wa.me/1234567890" target="_blank" rel="noopener noreferrer" class="fixed bottom-6 right-6 z-50 bg-[#25D366] text-white p-3 rounded-full shadow-lg hover:scale-110 transition-transform flex items-center justify-center w-[60px] h-[60px]">
        <svg fill="currentColor" viewBox="0 0 24 24" class="w-8 h-8"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>

    <script>
        // --- 1. BASE DE DATOS SEMILLA ---
        const baseProducts = [
            { name: "9 PM Rebel", brand: "Afnan", price: 165, image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&w=400&q=80", tags: ["arabe", "hombre"] },
            { name: "Club de Nuit", brand: "Armaf", price: 210, image: "https://images.unsplash.com/photo-1595532543228-5fce4b31bd35?auto=format&fit=crop&w=400&q=80", tags: ["arabe", "hombre"] },
            { name: "Khamrah", brand: "Lattafa", price: 180, image: "https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=400&q=80", tags: ["arabe", "unisex"] },
            { name: "Yara Pink", brand: "Lattafa", price: 145, image: "https://images.unsplash.com/photo-1588405748880-12d1d2a59f75?auto=format&fit=crop&w=400&q=80", tags: ["arabe", "mujer"] },
            { name: "Sauvage Elixir", brand: "Dior", price: 850, image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&w=400&q=80", tags: ["diseñador", "hombre"] },
            { name: "Coco Mademoiselle", brand: "Chanel", price: 920, image: "https://images.unsplash.com/photo-1596462502278-27bf85033811?auto=format&fit=crop&w=400&q=80", tags: ["diseñador", "mujer"] },
            { name: "Eros Flame", brand: "Versace", price: 420, image: "https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=400&q=80", tags: ["diseñador", "hombre"] },
            { name: "Libre Intense", brand: "YSL", price: 710, image: "https://images.unsplash.com/photo-1588405748880-12d1d2a59f75?auto=format&fit=crop&w=400&q=80", tags: ["diseñador", "mujer"] },
            { name: "Aventus", brand: "Creed", price: 1500, image: "https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=400&q=80", tags: ["nicho", "hombre"] },
            { name: "Baccarat Rouge", brand: "Maison F.K.", price: 1800, image: "https://images.unsplash.com/photo-1588405748880-12d1d2a59f75?auto=format&fit=crop&w=400&q=80", tags: ["nicho", "unisex"] },
            { name: "Delina Exclusif", brand: "Parfums de Marly", price: 1450, image: "https://images.unsplash.com/photo-1596462502278-27bf85033811?auto=format&fit=crop&w=400&q=80", tags: ["nicho", "mujer"] },
            { name: "Discovery Set Árabe", brand: "Lure Decants", price: 850, image: "https://images.unsplash.com/photo-1588405748880-12d1d2a59f75?auto=format&fit=crop&w=400&q=80", tags: ["Combo Decant", "unisex", "arabe"] },
            { name: "Pack Verano Diseñador", brand: "Lure Decants", price: 1100, image: "https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=400&q=80", tags: ["Combo Decant", "hombre", "diseñador"] },
            { name: "Set Nicho Femenino", brand: "Lure Decants", price: 1500, image: "https://images.unsplash.com/photo-1596462502278-27bf85033811?auto=format&fit=crop&w=400&q=80", tags: ["Combo Decant", "mujer", "nicho"] }
        ];

        // --- 2. GENERADOR DE 100 PRODUCTOS (Para pruebas) ---
        const productsDB = [];
        for (let i = 1; i <= 100; i++) {
            let base = baseProducts[i % baseProducts.length];
            productsDB.push({
                id: i,
                name: base.name + (i > baseProducts.length ? ` V.${Math.ceil(i/baseProducts.length)}` : ""),
                brand: base.brand,
                price: base.price + ((i % 3) * 20000), // Variación sutil de precio
                discount: (i % 6 === 0) ? 15 : 0, // 1 de cada 6 productos tiene descuento
                inStock: (i % 5 !== 0), // 1 de cada 5 productos está agotado (20% agotados)
                image: base.image,
                tags: base.tags
            });
        }

        // Utilidades HTML
        const grid = document.getElementById('product-grid');
        const countDisplay = document.getElementById('product-count');
        const noResultsMsg = document.getElementById('no-results');
        const formatPrice = (price) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(price);

        // --- 3. LÓGICA DE CONDICIONALES PARA FILTROS INTELIGENTES ---
        function getFilterState() {
            return {
                stock: document.getElementById('filter-stock').checked,
                out: document.getElementById('filter-out').checked,
                min: parseInt(document.getElementById('min-price').value) || 0,
                max: parseInt(document.getElementById('max-price').value) || 9999999,
                genders: Array.from(document.querySelectorAll('.filter-gender:checked')).map(cb => cb.value),
                categories: Array.from(document.querySelectorAll('.filter-category:checked')).map(cb => cb.value)
            };
        }

        function matchStock(p, state) {
            if (state.stock && !state.out && !p.inStock) return false;
            if (!state.stock && state.out && p.inStock) return false;
            return true;
        }

        function matchPrice(p, state) {
            const finalPrice = p.price - (p.price * (p.discount / 100));
            return finalPrice >= state.min && finalPrice <= state.max;
        }

        function matchGender(p, state) {
            if (state.genders.length === 0) return true;
            return state.genders.some(g => p.tags.includes(g));
        }

        function matchCategory(p, state) {
            if (state.categories.length === 0) return true;
            return state.categories.some(c => p.tags.includes(c));
        }

        // --- 4. CONTADORES DINÁMICOS FACETADOS ---
        function updateFilterCounts(state) {
            // Contamos Disponibilidad (depende de Precio, Género y Categoría)
            let baseForStock = productsDB.filter(p => matchPrice(p, state) && matchGender(p, state) && matchCategory(p, state));
            document.getElementById('count-stock').innerText = baseForStock.filter(p => p.inStock).length;
            document.getElementById('count-out').innerText = baseForStock.filter(p => !p.inStock).length;

            // Contamos Géneros (depende de Disponibilidad, Precio y Categoría)
            let baseForGender = productsDB.filter(p => matchStock(p, state) && matchPrice(p, state) && matchCategory(p, state));
            document.getElementById('count-hombre').innerText = baseForGender.filter(p => p.tags.includes('hombre')).length;
            document.getElementById('count-mujer').innerText = baseForGender.filter(p => p.tags.includes('mujer')).length;

            // Contamos Categorías (depende de Disponibilidad, Precio y Género)
            let baseForCategory = productsDB.filter(p => matchStock(p, state) && matchPrice(p, state) && matchGender(p, state));
            document.getElementById('count-arabe').innerText = baseForCategory.filter(p => p.tags.includes('arabe')).length;
            document.getElementById('count-combo').innerText = baseForCategory.filter(p => p.tags.includes('Combo Decant')).length;
            document.getElementById('count-disenador').innerText = baseForCategory.filter(p => p.tags.includes('diseñador')).length;
            document.getElementById('count-nicho').innerText = baseForCategory.filter(p => p.tags.includes('nicho')).length;
            document.getElementById('count-unisex').innerText = baseForCategory.filter(p => p.tags.includes('unisex')).length;
        }

        // --- 5. RENDERIZADO DE LA GRILLA ---
        function renderProducts(productsToRender) {
            grid.innerHTML = ''; 
            countDisplay.innerText = productsToRender.length; 

            if(productsToRender.length === 0) {
                noResultsMsg.classList.remove('hidden');
            } else {
                noResultsMsg.classList.add('hidden');
                
                productsToRender.forEach(product => {
                    const stockBadge = !product.inStock 
                        ? `<div class="absolute top-4 left-4 bg-gray-500 text-white text-[9px] font-bold tracking-[0.2em] uppercase px-2 py-1 z-10">Agotado</div>`
                        : (product.discount > 0 ? `<div class="absolute top-4 left-4 bg-lure-gold text-white text-[9px] font-bold tracking-[0.2em] uppercase px-2 py-1 z-10">Oferta</div>` : '');
                    
                    const discountBadge = product.discount > 0 && product.inStock
                        ? `<div class="absolute top-4 right-4 bg-lure-red text-white text-[9px] font-bold tracking-widest px-2 py-1 z-10">-${product.discount}%</div>`
                        : '';

                    const imageClass = !product.inStock ? 'opacity-40 grayscale' : 'group-hover:scale-105';

                    const cardHTML = `
                        <div class="border-r border-b border-lure-border relative p-8 flex flex-col items-center group cursor-pointer hover:bg-gray-50 transition-colors duration-300">
                            ${stockBadge}
                            ${discountBadge}
                            <div class="w-full h-64 mb-6 flex items-center justify-center overflow-hidden">
                                <img src="${product.image}" alt="${product.name}" class="max-h-full object-contain mix-blend-multiply transition-transform duration-500 ${imageClass}">
                            </div>
                            <p class="text-lure-gold text-[10px] tracking-[0.2em] font-semibold uppercase">${product.brand}</p>
                            <h3 class="font-serif text-xl font-medium mt-1 mb-2 text-center leading-tight">${product.name}</h3>
                            <div class="flex items-center space-x-2">
                                ${product.discount > 0 ? `<span class="text-xs text-gray-400 line-through">${formatPrice(product.price)}</span>` : ''}
                                <span class="text-sm text-gray-800 font-semibold">${formatPrice(product.price - (product.price * (product.discount / 100)))}</span>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                });
            }
        }

        // --- 6. EJECUCIÓN PRINCIPAL ---
        function applyFilters() {
            const state = getFilterState();

            // Filtrar productos
            const filteredProducts = productsDB.filter(p => {
                return matchStock(p, state) && matchPrice(p, state) && matchGender(p, state) && matchCategory(p, state);
            });

            // Actualizar vista y contadores dinámicos
            renderProducts(filteredProducts);
            updateFilterCounts(state);
        }

        function resetFilters() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('min-price').value = 0;
            document.getElementById('max-price').value = 1000;
            applyFilters();
        }

        // Event Listeners
        document.querySelectorAll('.filter-trigger').forEach(input => {
            input.addEventListener('change', applyFilters);
        });
        
        document.querySelectorAll('.filter-trigger-input').forEach(input => {
            input.addEventListener('input', applyFilters);
        });

        // Carga inicial
        applyFilters();

    </script>
</body>
</html>
