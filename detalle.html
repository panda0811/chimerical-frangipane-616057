    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    
    <script>
        const apiURL = "https://sheetdb.io/api/v1/cym2jp3lemwsn";
        const formatPrice = (price) => new Intl.NumberFormat('es-PE', { style: 'currency', currency: 'PEN', minimumFractionDigits: 0 }).format(price);

        // Transformar URL de Drive a miniatura directa
        function formatImageUrl(url) {
            if (!url) return '';
            let fileId = null;
            const driveMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (driveMatch && driveMatch[1]) {
                fileId = driveMatch[1];
            }
            const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (!fileId && idMatch && idMatch[1]) {
                fileId = idMatch[1];
            }
            if (fileId) {
                return `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
            }
            return url;
        }

        // Función para poblar listas (Sensaciones, Momentos) desde el texto con saltos de línea del Excel
        function procesarLista(texto, elementId) {
            const ul = document.getElementById(elementId);
            ul.innerHTML = '';
            if (texto && texto.trim() !== '') {
                // Separar por salto de línea
                const items = texto.split('\n').filter(item => item.trim() !== '');
                items.forEach(item => {
                    ul.innerHTML += `<li>${item.trim()}</li>`;
                });
            } else {
                ul.innerHTML = `<li>-</li>`;
            }
        }

        async function cargarDetallePerfume() {
            // Obtener el ID de la URL
            const urlParams = new URLSearchParams(window.location.search);
            const idPerfume = urlParams.get('id');

            if (!idPerfume) {
                document.getElementById('prod-nombre').textContent = "No se especificó un producto.";
                return;
            }

            try {
                // Descargar datos
                const respuesta = await fetch(apiURL);
                const productos = await respuesta.json();
                
                // Buscar el perfume por ID
                const datos = productos.find(p => String(p.id) === String(idPerfume));

                if (datos) {
                    // LLENAR TEXTOS PRINCIPALES
                    document.getElementById('prod-nombre').textContent = datos.name || 'Sin Nombre';
                    document.getElementById('prod-marca').textContent = datos.brand || 'Axon Perfumes';
                    
                    // PRECIOS Y DESCUENTOS
                    const price = Number(datos.price) || 0;
                    const discount = Number(datos.discount) || 0;
                    const finalPrice = price - (price * (discount / 100));

                    document.getElementById('prod-precio').textContent = formatPrice(finalPrice);
                    if (discount > 0) {
                        document.getElementById('prod-precio-tachado').textContent = formatPrice(price);
                    }

                    // IMÁGENES (img1, img2, img3)
                    const carrusel = document.getElementById('carrusel-imagenes');
                    carrusel.innerHTML = '';
                    
                    // Extraer imágenes y eliminar las vacías
                    let imagenesRaw = [datos.img1, datos.img2, datos.img3].filter(img => img && img.trim() !== '');
                    
                    // Si no hay ninguna de las 3, usamos la imagen principal (image) como respaldo
                    if (imagenesRaw.length === 0 && datos.image) {
                        imagenesRaw = [datos.image];
                    }

                    // Inyectar en el carrusel convirtiendo los links
                    if (imagenesRaw.length > 0) {
                        imagenesRaw.forEach(img => {
                            const urlLista = formatImageUrl(img);
                            carrusel.innerHTML += `
                                <div class="swiper-slide flex items-center justify-center p-8 bg-white">
                                    <img src="${urlLista}" class="object-contain w-full h-full mix-blend-multiply" alt="${datos.name}">
                                </div>`;
                        });
                    } else {
                        carrusel.innerHTML = `<div class="swiper-slide flex items-center justify-center text-gray-400 font-serif-custom text-xl">Sin imagen disponible</div>`;
                    }

                    // INICIALIZAR CARRUSEL
                    new Swiper(".mySwiper", {
                        navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
                        pagination: { el: ".swiper-pagination", clickable: true },
                        loop: imagenesRaw.length > 1 // Solo loop si hay más de 1 imagen
                    });

                    // WHATSAPP
                    const numeroWsp = "51928999490";
                    const mensajeWsp = encodeURIComponent(`Hola, estoy interesado en el perfume: ${datos.name} (${datos.brand}) a ${formatPrice(finalPrice)}.`);
                    document.getElementById('btn-whatsapp').href = `https://wa.me/${numeroWsp}?text=${mensajeWsp}`;

                    // INFO DETALLADA (Reemplazar saltos de línea por <br> para la intro)
                    document.getElementById('prod-intro').innerHTML = (datos.intro || 'Sin introducción disponible.').replace(/\n/g, '<br><br>');
                    
                    document.getElementById('prod-piramide').innerText = datos.piramide || '-';
                    document.getElementById('prod-perfil').textContent = datos.perfil || '-';
                    document.getElementById('prod-estilo').textContent = datos.estilo || '-';

                    // LISTAS
                    procesarLista(datos.sensaciones, 'prod-sensaciones');
                    procesarLista(datos.momentos, 'prod-momentos');

                } else {
                    document.getElementById('prod-nombre').textContent = "Perfume no encontrado";
                    document.getElementById('prod-marca').textContent = "Error";
                    document.getElementById('carrusel-imagenes').innerHTML = `<div class="swiper-slide flex items-center justify-center text-red-400">Error 404</div>`;
                }
            } catch (error) {
                console.error("Error cargando API:", error);
                document.getElementById('prod-nombre').textContent = "Error de conexión";
            }
        }

        // Ejecutar al cargar la página
        cargarDetallePerfume();
    </script>
